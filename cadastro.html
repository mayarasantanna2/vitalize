<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitalize</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"><!--icone voltar-->
    <link rel="icon" type="image/png" href="img/logov.png">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    <div class="cadastro-page">
        <div class="cadastro-card">

            <a href="index.html" class="login-btn-voltar">
                <span class="material-symbols-outlined">
                    arrow_back_ios_new
                </span>
            </a>

            <img src="img/logov.png" class="login-logo">

            <h1 class="login-titulo">Cadastre-Se</h1>

            <form action="login.html" class="login-form">
                <label>Nome:</label>
                <input type="text" class="login-input">

                <label>Email:</label>
                <input type="email" class="login-input">

                <label>Telefone:</label>
                <input type="tel" class="login-input">


                <label>Crie uma Senha:</label>
                <input type="password" class="login-input">

                <label>Repita a Senha:</label>
                <input type="password" class="login-input">

                <button class="login-btn">Cadastrar</button>

                <p class="subcadastro">Já tem uma conta? <a class="sublink" href="login.html">Clique Aqui</a> </p>

            </form>

        </div>
    </div>
    <script>
        const toggle = document.querySelector(".menu-toggle");
        const menu = document.querySelector(".menu");

        toggle.addEventListener("click", () => {
            menu.classList.toggle("ativo");
        });
    </script>
</body>

</html>
